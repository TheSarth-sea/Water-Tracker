<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AquaTrack - Smart Water Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="water-drop-animation">
                <div class="ripple"></div>
                <div class="ripple"></div>
                <div class="ripple"></div>
                <i class="fas fa-tint"></i>
            </div>
            <h1>AquaTrack</h1>
            <p>Making every drop count...</p>
        </div>
    </div>

    <!-- Main App -->
    <div class="app-container" id="appContainer">
        <!-- Background Effects -->
        <div class="bg-gradient"></div>
        <div class="water-waves"></div>
        
        <!-- Auth Container (Login/Signup) -->
        <div class="auth-container glass-effect" id="authContainer">
            <div class="auth-header">
                <div class="logo-icon-large">
                    <i class="fas fa-tint"></i>
                </div>
                <h2 id="authTitle">Welcome Back</h2>
                <p id="authSubtitle">Track your water consumption journey</p>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form">
                <div class="input-group-glass">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Email address" autocomplete="email">
                </div>
                <div class="input-group-glass">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
                </div>
                <button class="btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Login</span>
                </button>
                <p class="auth-switch">
                    New to AquaTrack?
                    <button id="showSignupBtn" class="link-btn">Create Account</button>
                </p>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="auth-form" style="display: none;">
                <div class="input-group-glass">
                    <i class="fas fa-user"></i>
                    <input type="text" id="signupName" placeholder="Full name">
                </div>
                <div class="input-group-glass">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="signupEmail" placeholder="Email address">
                </div>
                <div class="input-group-glass">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signupPassword" placeholder="Password (min 6 characters)">
                </div>
                <button class="btn-primary" id="signupBtn">
                    <i class="fas fa-user-plus"></i>
                    <span>Sign Up</span>
                </button>
                <p class="auth-switch">
                    Already have an account?
                    <button id="showLoginBtn" class="link-btn">Login</button>
                </p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
