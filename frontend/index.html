<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>💧 AquaTrack - Smart Water Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="water-drop-animation">
                <div class="ripple"></div>
                <div class="ripple"></div>
                <div class="ripple"></div>
                <i class="fas fa-tint"></i>
            </div>
            <h1>AquaTrack</h1>
            <p>Making every drop count...</p>
        </div>
    </div>

    <div class="app-container" id="appContainer">
        <div class="bg-gradient"></div>
        <div class="water-waves"></div>
        
        <div class="auth-container glass-effect" id="authContainer">
            <div class="auth-header">
                <div class="logo-icon-large">
                    <i class="fas fa-tint"></i>
                </div>
                <h2 id="authTitle">Welcome Back</h2>
                <p id="authSubtitle">Track your water consumption journey</p>
            </div>

            <div id="loginForm" class="auth-form">
                <div class="input-group-glass">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Email address">
                </div>
                <div class="input-group-glass">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password">
                </div>
                <button class="btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Login</span>
                </button>
                <p class="auth-switch">
                    New to AquaTrack?
                    <button id="showSignupBtn" class="link-btn">Create Account</button>
                </p>
            </div>

            <div id="signupForm" class="auth-form" style="display: none;">
                <div class="input-group-glass">
                    <i class="fas fa-user"></i>
                    <input type="text" id="signupName" placeholder="Full name">
                </div>
                <div class="input-group-glass">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="signupEmail" placeholder="Email address">
                </div>
                <div class="input-group-glass">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signupPassword" placeholder="Password (min 6 characters)">
                </div>
                <button class="btn-primary" id="signupBtn">
                    <i class="fas fa-user-plus"></i>
                    <span>Sign Up</span>
                </button>
                <p class="auth-switch">
                    Already have an account?
                    <button id="showLoginBtn" class="link-btn">Login</button>
                </p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        
        // Emergency hide loading screen
        setTimeout(() => {
            const ls = document.getElementById('loadingScreen');
            if (ls) { ls.style.opacity = '0'; setTimeout(() => { ls.style.display = 'none'; }, 500); }
        }, 2000);
        
        // Check if already logged in
        const token = localStorage.getItem('token');
        if (token) {
            fetch(`${API_URL}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(res => { if (res.ok) window.location.href = '/dashboard.html'; })
                .catch(() => {});
        }
        
        // Auth functions
        document.getElementById('loginBtn')?.addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) { alert('Please fill all fields'); return; }
            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else { alert(data.message); }
            } catch (err) { alert('Network error'); }
        });
        
        document.getElementById('signupBtn')?.addEventListener('click', async () => {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            if (!name || !email || !password) { alert('Please fill all fields'); return; }
            if (password.length < 6) { alert('Password must be at least 6 characters'); return; }
            try {
                const res = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else { alert(data.message); }
            } catch (err) { alert('Network error'); }
        });
        
        document.getElementById('showSignupBtn')?.addEventListener('click', () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.getElementById('authTitle').innerText = 'Create Account';
            document.getElementById('authSubtitle').innerText = 'Start tracking your water usage today';
        });
        
        document.getElementById('showLoginBtn')?.addEventListener('click', () => {
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('authTitle').innerText = 'Welcome Back';
            document.getElementById('authSubtitle').innerText = 'Track your water consumption journey';
        });
    </script>
</body>
</html>
