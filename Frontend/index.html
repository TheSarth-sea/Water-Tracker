<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Water Tracker - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-blue-50 via-cyan-50 to-teal-50">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
      <!-- Logo and Title -->
      <div class="text-center mb-8 animate-fade-in">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-r from-blue-500 to-cyan-500 rounded-2xl shadow-lg mb-4">
          <i class="fas fa-tint text-white text-3xl"></i>
        </div>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-cyan-600 bg-clip-text text-transparent">
          Smart Water Tracker
        </h1>
        <p class="text-gray-600 mt-2">Track, analyze, and reduce your water consumption</p>
      </div>

      <!-- Auth Container -->
      <div id="auth-container" class="bg-white/80 backdrop-blur-xl rounded-2xl shadow-xl p-8 animate-slide-up">
        <!-- Login Form -->
        <div id="login-form">
          <h2 class="text-2xl font-semibold text-gray-800 mb-6">Welcome Back</h2>
          <form id="login-form-element">
            <div class="mb-4">
              <label class="block text-gray-700 text-sm font-medium mb-2">Email Address</label>
              <div class="relative">
                <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="email" id="login-email" required class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
              </div>
            </div>
            <div class="mb-6">
              <label class="block text-gray-700 text-sm font-medium mb-2">Password</label>
              <div class="relative">
                <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="password" id="login-password" required class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
              </div>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 text-white font-semibold py-3 rounded-xl hover:shadow-lg transform hover:scale-105 transition-all duration-200">
              Login
            </button>
          </form>
          <p class="text-center text-gray-600 mt-6">
            Don't have an account?
            <button onclick="toggleAuth()" class="text-blue-600 font-semibold hover:text-blue-700 transition">Sign Up</button>
          </p>
        </div>

        <!-- Signup Form (Hidden by default) -->
        <div id="signup-form" class="hidden">
          <h2 class="text-2xl font-semibold text-gray-800 mb-6">Create Account</h2>
          <form id="signup-form-element">
            <div class="mb-4">
              <label class="block text-gray-700 text-sm font-medium mb-2">Full Name</label>
              <div class="relative">
                <i class="fas fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="signup-name" required class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
              </div>
            </div>
            <div class="mb-4">
              <label class="block text-gray-700 text-sm font-medium mb-2">Email Address</label>
              <div class="relative">
                <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="email" id="signup-email" required class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
              </div>
            </div>
            <div class="mb-6">
              <label class="block text-gray-700 text-sm font-medium mb-2">Password</label>
              <div class="relative">
                <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="password" id="signup-password" required class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
              </div>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 text-white font-semibold py-3 rounded-xl hover:shadow-lg transform hover:scale-105 transition-all duration-200">
              Sign Up
            </button>
          </form>
          <p class="text-center text-gray-600 mt-6">
            Already have an account?
            <button onclick="toggleAuth()" class="text-blue-600 font-semibold hover:text-blue-700 transition">Login</button>
          </p>
        </div>
      </div>

      <!-- Features Section -->
      <div class="mt-8 grid grid-cols-3 gap-4 animate-fade-in-delay">
        <div class="text-center">
          <i class="fas fa-chart-line text-blue-500 text-2xl mb-2"></i>
          <p class="text-xs text-gray-600">Analytics</p>
        </div>
        <div class="text-center">
          <i class="fas fa-trophy text-yellow-500 text-2xl mb-2"></i>
          <p class="text-xs text-gray-600">Achievements</p>
        </div>
        <div class="text-center">
          <i class="fas fa-moon text-purple-500 text-2xl mb-2"></i>
          <p class="text-xs text-gray-600">Dark Mode</p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
