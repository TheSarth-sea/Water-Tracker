<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Water Tracker - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .bg-gradient-custom { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-cyan-50 to-teal-50">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
      <!-- Logo and Title -->
      <div class="text-center mb-8 animate-fade-in">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-r from-blue-500 to-cyan-500 rounded-2xl shadow-lg mb-4">
          <i class="fas fa-tint text-white text-3xl"></i>
        </div>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-cyan-600 bg-clip-text text-transparent">
          Smart Water Tracker
        </h1>
        <p class="text-gray-600 mt-2">Track, analyze, and reduce your water consumption</p>
      </div>

      <!-- Auth Container -->
      <div id="auth-container" class="bg-white/80 backdrop-blur-xl rounded-2xl shadow-xl p-8">
        <!-- Login Form -->
        <div id="login-form">
          <h2 class="text-2xl font-semibold text-gray-800 mb-6">Welcome Back</h2>
          <form id="login-form-element">
            <div class="mb-4">
              <label class="block text-gray-700 text-sm font-medium mb-2">Email Address</label>
              <div class="relative">
                <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="email" id="login-email" required class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>
            </div>
            <div class="mb-6">
              <label class="block text-gray-700 text-sm font-medium mb-2">Password</label>
              <div class="relative">
                <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="password" id="login-password" required class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 text-white font-semibold py-3 rounded-xl hover:shadow-lg transform hover:scale-105 transition-all duration-200">
              Login
            </button>
          </form>
          <p class="text-center text-gray-600 mt-6">
            Don't have an account?
            <button onclick="toggleAuth()" class="text-blue-600 font-semibold hover:text-blue-700 transition">Sign Up</button>
          </p>
        </div>

        <!-- Signup Form -->
        <div id="signup-form" class="hidden">
          <h2 class="text-2xl font-semibold text-gray-800 mb-6">Create Account</h2>
          <form id="signup-form-element">
            <div class="mb-4">
              <label class="block text-gray-700 text-sm font-medium mb-2">Full Name</label>
              <div class="relative">
                <i class="fas fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="signup-name" required class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>
            </div>
            <div class="mb-4">
              <label class="block text-gray-700 text-sm font-medium mb-2">Email Address</label>
              <div class="relative">
                <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="email" id="signup-email" required class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>
            </div>
            <div class="mb-6">
              <label class="block text-gray-700 text-sm font-medium mb-2">Password</label>
              <div class="relative">
                <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="password" id="signup-password" required class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
              </div>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 text-white font-semibold py-3 rounded-xl hover:shadow-lg transform hover:scale-105 transition-all duration-200">
              Sign Up
            </button>
          </form>
          <p class="text-center text-gray-600 mt-6">
            Already have an account?
            <button onclick="toggleAuth()" class="text-blue-600 font-semibold hover:text-blue-700 transition">Login</button>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    let currentForm = 'login';

    function toggleAuth() {
      const loginForm = document.getElementById('login-form');
      const signupForm = document.getElementById('signup-form');
      
      if (currentForm === 'login') {
        loginForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
        currentForm = 'signup';
      } else {
        signupForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
        currentForm = 'login';
      }
    }

    // Login Handler
    document.getElementById('login-form-element').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else {
          showError(data.message);
        }
      } catch (error) {
        showError('Network error. Please try again.');
      }
    });

    // Signup Handler
    document.getElementById('signup-form-element').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      
      try {
        const response = await fetch(`${API_URL}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else {
          showError(data.message);
        }
      } catch (error) {
        showError('Network error. Please try again.');
      }
    });

    function showError(message) {
      const container = document.getElementById('auth-container');
      const errorDiv = document.createElement('div');
      errorDiv.className = 'mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm';
      errorDiv.innerHTML = `<i class="fas fa-exclamation-circle mr-2"></i>${message}`;
      
      const existingError = container.querySelector('.bg-red-100');
      if (existingError) existingError.remove();
      
      container.appendChild(errorDiv);
      setTimeout(() => errorDiv.remove(), 3000);
    }
  </script>
</body>
</html>
