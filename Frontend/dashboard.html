<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Water Tracker - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .progress-bar { transition: width 0.5s ease; }
    .toast { position: fixed; bottom: 20px; right: 20px; z-index: 1000; animation: slideIn 0.3s ease; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    body.dark-mode { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    body.dark-mode .bg-white\/80 { background: rgba(30, 41, 59, 0.9); }
    body.dark-mode .text-gray-800, body.dark-mode .text-gray-700 { color: #e2e8f0; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-cyan-50 to-teal-50 transition-all">
  <!-- Loading Overlay -->
  <div id="loading" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-xl p-6 flex items-center space-x-3">
      <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div>
      <span>Loading...</span>
    </div>
  </div>

  <div class="min-h-screen">
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-40">
      <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="flex justify-between items-center">
          <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-cyan-500 rounded-xl flex items-center justify-center">
              <i class="fas fa-tint text-white text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600">
              AquaTrack
            </h1>
          </div>
          <div class="flex items-center space-x-4">
            <button id="darkModeToggle" class="p-2 rounded-lg bg-gray-100 hover:bg-gray-200 transition">
              <i class="fas fa-moon text-gray-700"></i>
            </button>
            <span id="userName" class="text-gray-700 font-medium"></span>
            <button id="logoutBtn" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
              <i class="fas fa-sign-out-alt mr-2"></i>Logout
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
      <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg">
          <div class="flex justify-between items-start">
            <div>
              <p class="text-gray-500 text-sm">Today's Water</p>
              <p id="todayTotal" class="text-3xl font-bold text-blue-600">0 L</p>
            </div>
            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
              <i class="fas fa-tint text-blue-600 text-xl"></i>
            </div>
          </div>
          <div class="mt-4">
            <div class="flex justify-between text-sm mb-1">
              <span>Daily Goal</span>
              <span id="dailyLimitDisplay">0 L</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
              <div id="progressBar" class="progress-bar bg-gradient-to-r from-blue-500 to-cyan-500 h-2 rounded-full" style="width: 0%"></div>
            </div>
          </div>
        </div>

        <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg">
          <div class="flex justify-between items-start">
            <div>
              <p class="text-gray-500 text-sm">Weekly Average</p>
              <p id="weeklyAvg" class="text-3xl font-bold text-cyan-600">0 L</p>
            </div>
            <div class="w-12 h-12 bg-cyan-100 rounded-full flex items-center justify-center">
              <i class="fas fa-chart-line text-cyan-600 text-xl"></i>
            </div>
          </div>
        </div>

        <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg">
          <div class="flex justify-between items-start">
            <div>
              <p class="text-gray-500 text-sm">Total Saved</p>
              <p id="totalSaved" class="text-3xl font-bold text-green-600">0 L</p>
            </div>
            <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
              <i class="fas fa-leaf text-green-600 text-xl"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- Add Water Entry -->
      <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg mb-8">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Add Water Intake</h2>
        <div class="flex flex-col sm:flex-row gap-4">
          <input type="number" id="waterAmount" step="0.1" placeholder="Amount in liters" class="flex-1 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
          <input type="date" id="waterDate" class="px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
          <button id="addWaterBtn" class="px-6 py-3 bg-gradient-to-r from-blue-600 to-cyan-600 text-white rounded-xl hover:shadow-lg transition">
            <i class="fas fa-plus mr-2"></i>Add Entry
          </button>
        </div>
        <div id="alertMessage" class="mt-4 hidden"></div>
      </div>

      <!-- Charts -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
        <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg">
          <h3 class="text-lg font-semibold text-gray-800 mb-4">Weekly Trend</h3>
          <canvas id="weeklyChart" height="250"></canvas>
        </div>
        <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg">
          <h3 class="text-lg font-semibold text-gray-800 mb-4">Monthly Overview</h3>
          <canvas id="monthlyChart" height="250"></canvas>
        </div>
      </div>

      <!-- Smart Insights -->
      <div class="bg-gradient-to-r from-blue-500 to-cyan-500 rounded-2xl p-6 shadow-lg mb-8 text-white">
        <div class="flex items-start space-x-4">
          <i class="fas fa-lightbulb text-3xl"></i>
          <div class="flex-1">
            <h3 class="text-xl font-semibold mb-2">Smart Insight</h3>
            <p id="insightText">Loading insights...</p>
          </div>
        </div>
      </div>

      <!-- History Table -->
      <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-lg font-semibold text-gray-800">Water History</h3>
          <button id="exportBtn" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition">
            <i class="fas fa-download mr-2"></i>Export CSV
          </button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="border-b">
              <tr class="text-left">
                <th class="pb-3">Date</th>
                <th class="pb-3">Amount (L)</th>
                <th class="pb-3">Actions</th>
              </tr>
            </thead>
            <tbody id="historyTable"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_URL = window.location.origin;
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';

    let currentUser = null;
    let waterEntries = [];

    async function loadUserData() {
      try {
        const response = await fetch(`${API_URL}/api/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
          currentUser = await response.json();
          document.getElementById('userName').textContent = currentUser.name;
          document.getElementById('dailyLimitDisplay').textContent = `${currentUser.dailyLimit} L`;
        } else {
          logout();
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }

    async function loadWaterEntries() {
      try {
        showLoading(true);
        const response = await fetch(`${API_URL}/api/water`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        if (response.ok) {
          waterEntries = data.entries;
          updateDashboard();
        }
      } catch (error) {
        console.error('Error:', error);
      } finally {
        showLoading(false);
      }
    }

    async function addWaterEntry(amount, date) {
      try {
        showLoading(true);
        const response = await fetch(`${API_URL}/api/water`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ amount, date })
        });
        if (response.ok) {
          await loadWaterEntries();
          showToast('Entry added!', 'success');
        }
      } catch (error) {
        showToast('Error adding entry', 'error');
      } finally {
        showLoading(false);
      }
    }

    async function deleteWaterEntry(id) {
      if (!confirm('Delete this entry?')) return;
      try {
        showLoading(true);
        const response = await fetch(`${API_URL}/api/water/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
          await loadWaterEntries();
          showToast('Entry deleted!', 'success');
        }
      } catch (error) {
        showToast('Error deleting entry', 'error');
      } finally {
        showLoading(false);
      }
    }

    function updateDashboard() {
      const today = new Date().toISOString().split('T')[0];
      const todayTotal = waterEntries
        .filter(e => e.date.split('T')[0] === today)
        .reduce((sum, e) => sum + e.amount, 0);
      
      document.getElementById('todayTotal').textContent = `${todayTotal.toFixed(1)} L`;
      const percent = Math.min(100, (todayTotal / currentUser.dailyLimit) * 100);
      document.getElementById('progressBar').style.width = `${percent}%`;
      
      if (todayTotal > currentUser.dailyLimit) {
        document.getElementById('alertMessage').innerHTML = '<div class="bg-yellow-100 border border-yellow-400 text-yellow-700 p-3 rounded"><i class="fas fa-exclamation-triangle mr-2"></i>Exceeded daily limit!</div>';
        document.getElementById('alertMessage').classList.remove('hidden');
      } else {
        document.getElementById('alertMessage').classList.add('hidden');
      }
      
      updateHistoryTable();
      loadInsights();
      updateCharts();
    }

    function updateHistoryTable() {
      const tbody = document.getElementById('historyTable');
      const sorted = [...waterEntries].sort((a, b) => new Date(b.date) - new Date(a.date));
      tbody.innerHTML = sorted.slice(0, 10).map(entry => `
        <tr class="border-b">
          <td class="py-3">${new Date(entry.date).toLocaleDateString()}</td>
          <td class="py-3">${entry.amount} L</td>
          <td class="py-3">
            <button onclick="deleteWaterEntry('${entry._id}')" class="text-red-500 hover:text-red-700">
              <i class="fas fa-trash-alt"></i>
            </button>
          </td>
        </tr>
      `).join('');
    }

    async function loadInsights() {
      try {
        const response = await fetch(`${API_URL}/api/analytics/insights`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        if (response.ok) {
          document.getElementById('insightText').textContent = data.exceeded ? 
            `⚠️ Exceeded limit by ${(data.todayTotal - data.dailyLimit).toFixed(1)}L. ${data.tip}` :
            `💪 Great! ${data.remaining.toFixed(1)}L remaining. ${data.tip}`;
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }

    let weeklyChart, monthlyChart;
    function updateCharts() {
      const weeklyData = Array(7).fill(0);
      const today = new Date();
      const startOfWeek = new Date(today);
      startOfWeek.setDate(today.getDate() - today.getDay());
      
      waterEntries.forEach(entry => {
        const entryDate = new Date(entry.date);
        const dayDiff = Math.floor((entryDate - startOfWeek) / (1000*60*60*24));
        if (dayDiff >= 0 && dayDiff < 7) weeklyData[dayDiff] += entry.amount;
      });
      
      if (weeklyChart) weeklyChart.destroy();
      weeklyChart = new Chart(document.getElementById('weeklyChart'), {
        type: 'bar',
        data: { labels: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], datasets: [{ label: 'Liters', data: weeklyData, backgroundColor: '#3b82f6' }] }
      });
      
      const monthlyData = Array(31).fill(0);
      waterEntries.forEach(entry => {
        const d = new Date(entry.date);
        if (d.getMonth() === today.getMonth()) monthlyData[d.getDate()-1] += entry.amount;
      });
      
      if (monthlyChart) monthlyChart.destroy();
      monthlyChart = new Chart(document.getElementById('monthlyChart'), {
        type: 'line',
        data: { labels: Array.from({length:31}, (_,i)=>i+1), datasets: [{ label: 'Liters', data: monthlyData, borderColor: '#06b6d4', tension: 0.4 }] }
      });
    }

    function exportCSV() {
      let csv = "Date,Amount (L)\n";
      waterEntries.forEach(e => csv += `${new Date(e.date).toLocaleDateString()},${e.amount}\n`);
      const blob = new Blob([csv], {type: 'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `water_data_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('CSV exported!', 'success');
    }

    function showToast(msg, type) {
      const toast = document.createElement('div');
      toast.className = `toast ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white px-6 py-3 rounded-lg shadow-lg`;
      toast.innerHTML = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function showLoading(show) {
      document.getElementById('loading').classList.toggle('hidden', !show);
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/';
    }

    document.getElementById('addWaterBtn').addEventListener('click', () => {
      const amount = parseFloat(document.getElementById('waterAmount').value);
      const date = document.getElementById('waterDate').value || new Date().toISOString().split('T')[0];
      if (amount > 0) addWaterEntry(amount, date);
      else showToast('Enter valid amount', 'error');
      document.getElementById('waterAmount').value = '';
    });
    
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('exportBtn').addEventListener('click', exportCSV);
    
    document.getElementById('darkModeToggle').addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('darkMode', isDark);
    });
    
    if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
    
    loadUserData();
    loadWaterEntries();
  </script>
</body>
</html>
