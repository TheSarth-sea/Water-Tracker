<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Water Tracker - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-blue-50 via-cyan-50 to-teal-50 transition-all duration-300">
  <!-- Loading Overlay -->
  <div id="loading-overlay" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-50 flex items-center justify-center hidden">
    <div class="text-center">
      <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-blue-600 mx-auto mb-4"></div>
      <p class="text-gray-600">Loading...</p>
    </div>
  </div>

  <!-- Main Container -->
  <div class="min-h-screen">
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-40">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
        <div class="flex justify-between items-center">
          <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-cyan-500 rounded-xl flex items-center justify-center">
              <i class="fas fa-tint text-white text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-cyan-600 bg-clip-text text-transparent">
              AquaTrack
            </h1>
          </div>
          <div class="flex items-center space-x-4">
            <button id="darkModeToggle" class="p-2 rounded-lg bg-gray-100 hover:bg-gray-200 transition">
              <i class="fas fa-moon text-gray-700"></i>
            </button>
            <div class="flex items-center space-x-3">
              <span id="userName" class="text-gray-700 font-medium"></span>
              <button id="logoutBtn" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition transform hover:scale-105">
                <i class="fas fa-sign-out-alt mr-2"></i>Logout
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-500 text-sm">Today's Water</p>
              <p id="todayTotal" class="text-3xl font-bold text-blue-600">0 L</p>
            </div>
            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
              <i class="fas fa-tint text-blue-600 text-xl"></i>
            </div>
          </div>
          <div class="mt-4">
            <div class="flex justify-between text-sm mb-1">
              <span>Daily Goal</span>
              <span id="dailyLimitDisplay">0 L</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
              <div id="progressBar" class="bg-gradient-to-r from-blue-500 to-cyan-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
          </div>
        </div>

        <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-500 text-sm">Weekly Average</p>
              <p id="weeklyAvg" class="text-3xl font-bold text-cyan-600">0 L</p>
            </div>
            <div class="w-12 h-12 bg-cyan-100 rounded-full flex items-center justify-center">
              <i class="fas fa-chart-line text-cyan-600 text-xl"></i>
            </div>
          </div>
        </div>

        <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-500 text-sm">Total Saved</p>
              <p id="totalSaved" class="text-3xl font-bold text-green-600">0 L</p>
            </div>
            <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
              <i class="fas fa-leaf text-green-600 text-xl"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- Add Water Entry -->
      <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg mb-8">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Add Water Intake</h2>
        <div class="flex flex-col sm:flex-row gap-4">
          <input type="number" id="waterAmount" step="0.1" placeholder="Amount in liters" class="flex-1 px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
          <input type="date" id="waterDate" class="px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
          <button id="addWaterBtn" class="px-6 py-3 bg-gradient-to-r from-blue-600 to-cyan-600 text-white rounded-xl hover:shadow-lg transform hover:scale-105 transition-all duration-200">
            <i class="fas fa-plus mr-2"></i>Add Entry
          </button>
        </div>
        <div id="alertMessage" class="mt-4 hidden"></div>
      </div>

      <!-- Charts -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
        <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg">
          <h3 class="text-lg font-semibold text-gray-800 mb-4">Weekly Trend</h3>
          <canvas id="weeklyChart" height="250"></canvas>
        </div>
        <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg">
          <h3 class="text-lg font-semibold text-gray-800 mb-4">Monthly Overview</h3>
          <canvas id="monthlyChart" height="250"></canvas>
        </div>
      </div>

      <!-- Smart Insights & Tips -->
      <div class="bg-gradient-to-r from-blue-500 to-cyan-500 rounded-2xl p-6 shadow-lg mb-8 text-white">
        <div class="flex items-start space-x-4">
          <i class="fas fa-lightbulb text-3xl"></i>
          <div class="flex-1">
            <h3 class="text-xl font-semibold mb-2">Smart Insight</h3>
            <p id="insightText" class="text-white/90">Loading insights...</p>
          </div>
        </div>
      </div>

      <!-- Badges Section -->
      <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg mb-8">
        <h3 class="text-lg font-semibold text-gray-800 mb-4">Achievement Badges</h3>
        <div id="badgesContainer" class="flex flex-wrap gap-3">
          <!-- Badges will be dynamically added -->
        </div>
      </div>

      <!-- History Table -->
      <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-6 shadow-lg">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-lg font-semibold text-gray-800">Water History</h3>
          <button id="exportBtn" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition">
            <i class="fas fa-download mr-2"></i>Export CSV
          </button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="border-b border-gray-200">
              <tr class="text-left">
                <th class="pb-3">Date</th>
                <th class="pb-3">Amount (L)</th>
                <th class="pb-3">Notes</th>
                <th class="pb-3">Actions</th>
              </tr>
            </thead>
            <tbody id="historyTable">
              <!-- Dynamic content -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="js/dashboard.js"></script>
  <script src="js/charts.js"></script>
</body>
</html>
